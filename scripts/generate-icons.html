<!DOCTYPE html>
<html>
<head><title>Generate Icons</title>
<style>body{font-family:sans-serif;padding:2rem;background:#1A4731;color:#C0E8CC}
button{background:#2D7A4F;color:#C0E8CC;border:none;padding:1rem 2rem;font-size:1rem;cursor:pointer;border-radius:8px;margin:0.5rem}
canvas{display:block;margin:1rem 0;border-radius:12px}</style>
</head>
<body>
<h1>Protein Tracker Icon Generator</h1>
<p>Click the buttons below, then save the downloaded PNGs to <code>public/icons/</code></p>
<button onclick="generate(192)">Download icon-192.png</button>
<button onclick="generate(512)">Download icon-512.png</button>
<div id="previews"></div>
<script>
function generate(size) {
  const canvas = document.createElement('canvas')
  canvas.width = size; canvas.height = size
  const ctx = canvas.getContext('2d')

  // Background rounded rect
  const r = size * 0.22
  ctx.beginPath()
  ctx.moveTo(r, 0)
  ctx.lineTo(size - r, 0)
  ctx.quadraticCurveTo(size, 0, size, r)
  ctx.lineTo(size, size - r)
  ctx.quadraticCurveTo(size, size, size - r, size)
  ctx.lineTo(r, size)
  ctx.quadraticCurveTo(0, size, 0, size - r)
  ctx.lineTo(0, r)
  ctx.quadraticCurveTo(0, 0, r, 0)
  ctx.closePath()
  ctx.fillStyle = '#1A4731'
  ctx.fill()

  // Outer circle
  ctx.beginPath()
  ctx.arc(size/2, size/2, size * 0.33, 0, Math.PI * 2)
  ctx.fillStyle = '#2D7A4F'
  ctx.fill()

  // Inner circle
  ctx.beginPath()
  ctx.arc(size/2, size/2, size * 0.235, 0, Math.PI * 2)
  ctx.fillStyle = '#1A4731'
  ctx.fill()

  // P letter
  ctx.fillStyle = '#C0E8CC'
  ctx.font = `bold ${Math.round(size * 0.30)}px Georgia, serif`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('P', size/2, size/2 + size*0.025)

  // Accent dots
  ctx.beginPath()
  ctx.arc(size*0.664, size*0.352, size*0.043, 0, Math.PI*2)
  ctx.fillStyle = '#5DB07A'
  ctx.fill()

  ctx.beginPath()
  ctx.arc(size*0.336, size*0.41, size*0.028, 0, Math.PI*2)
  ctx.fillStyle = '#5DB07A'
  ctx.globalAlpha = 0.7
  ctx.fill()
  ctx.globalAlpha = 1

  // Download
  canvas.toBlob(blob => {
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = `icon-${size}.png`
    a.click()
  }, 'image/png')

  // Preview
  canvas.style.width = '128px'
  canvas.style.height = '128px'
  canvas.title = `icon-${size}.png`
  const previews = document.getElementById('previews')
  const label = document.createElement('p')
  label.textContent = `icon-${size}.png — save to public/icons/`
  previews.appendChild(label)
  previews.appendChild(canvas)
}
</script>
</body>
</html>
