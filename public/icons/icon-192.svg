<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&amp;display=swap');
    </style>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#9A3412"/>
      <stop offset="100%" stop-color="#4C1407"/>
    </radialGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FEF3C7" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#FDBA74" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="dot" cx="33%" cy="28%" r="58%">
      <stop offset="0%"   stop-color="#FF9A38"/>
      <stop offset="100%" stop-color="#BE3E0A"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Wave -->
  <path d="M62 288 Q118 170 174 288 Q230 406 286 288 Q330 206 418 238"
        stroke="url(#wave)" stroke-width="38" stroke-linecap="round" fill="none"/>

  <!-- Dot in first belly -->
  <circle cx="174" cy="196" r="52" fill="url(#dot)"/>
  <circle cx="156" cy="178" r="18" fill="#FFCC80" opacity="0.35"/>

  <!-- nn text -->
  <text x="256" y="430"
        font-family="Outfit, system-ui, sans-serif"
        font-weight="900"
        font-size="148"
        fill="#FED7AA"
        text-anchor="middle"
        letter-spacing="-2">nn</text>
</svg>
